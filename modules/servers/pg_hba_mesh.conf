# Postgres HBA rules for mesh agents (Tailscale IPs)
# Local unix socket
local all all peer
# Restricted schemas — IP-locked roles
# Finance: Chat (write) + Ene (read)
# host svalbard finance_admin <CHAT_TAILSCALE_IP>/32 scram-sha-256
# host svalbard finance_reader <ENE_TAILSCALE_IP>/32 scram-sha-256
# Personal: Chat (write) + Ene (read)
# host svalbard personal_admin <CHAT_TAILSCALE_IP>/32 scram-sha-256
# host svalbard personal_reader <ENE_TAILSCALE_IP>/32 scram-sha-256
# Work: Rook only
# host svalbard work_admin <ROOK_TAILSCALE_IP>/32 scram-sha-256
# General mesh access (entire Tailscale CGNAT range)
host all mesh 100.64.0.0/10 scram-sha-256
host all mesh_reader 100.64.0.0/10 scram-sha-256
# Add specific agent IPs in pg_hba_mesh.local.conf (gitignored, per-host)
