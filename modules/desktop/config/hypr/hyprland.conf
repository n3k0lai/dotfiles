#   ;3
# my hypr conf
#

# nvidia config (RTX 3070, proprietary driver)
# See the misc{} + render{} blocks below for the vfr / explicit_sync tunings
# that resolve most "fullscreen client freezes" (YouTube, RDP, etc.).
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = NVD_BACKEND,direct

cursor {
    no_hardware_cursors = true
}

# NVIDIA stability tuning (RTX 3070 + Hyprland on Wayland)
# These are the primary levers for the "random fullscreen window freezes"
# (YouTube in Firefox, werk RDP, games, etc.) that occur with the proprietary driver.
#
# vfr = false           — most common fix; disables variable frame rate which
#                         frequently causes presentation hangs on NVIDIA when a
#                         client enters fullscreen or direct scanout.
# vrr = 1               — enable VRR where supported (gaming monitor).
#
# explicit_sync (under render) controls NVIDIA explicit sync / syncobj.
# This must be in sync with the driver (550+). Mismatches are a very common
# source of individual fullscreen client freezes (while the rest of the session
# keeps working).
#
# After changing, run: hyprctl reload
# Test for 24-48 h. If freezes persist, try flipping the booleans one at a time.
misc {
    vfr = false
    vrr = 1
}

render {
    explicit_sync = true
    explicit_sync_kms = true
}

# (Optional last resort) Composition bypass — can help or hurt; test last.
#debug {
#    full_cm_bypass = true
#}

# fcitx5: unset legacy IM vars on Wayland (set by i18n.inputMethod module)
# fcitx5 uses the native Wayland input method protocol instead
env = GTK_IM_MODULE,
env = QT_IM_MODULE,

# See https://wiki.hyprland.org/Configuring/Monitors/
# hyprctl monitors all
#
$laptopM = desc:Sharp Corporation 0x14B8
$gamingM = desc:BNQ BenQ EX2710Q RBM07168019
$vertM   = desc:BNQ ZOWIE XL LCD LAG03858SL0
$topM    = desc:Lenovo Group Limited LEN X24A U3802912
#$crtM    = desc:???

#      0    720    1920   2560          4480     5560
# 0    +-----+             +-------------+
#      | CRT |             |             |
# 480  +-----+             |     Top     |
# 600                      |             +---------+
#                          |             |    V    |
# 1080              +------+-------------+    e    |
#                   |                    |    r    |
# 1440 +------------+                    |    t    |
#      |            |       Gaming       |    i    |
#      |   laptop   |                    |    c    |
#      |            |                    |    al   |
# 2520 +------------+--------------------+---------+

#       monitor   Resolution    x-y    scale  modifiers
monitor=$laptopM, 1920x1080@60, 0x1440,    1
monitor=$gamingM, 2560x1440@144, 1920x1080, 1
monitor=$topM,    1920x1080@144, 2560x0,    1
monitor=$vertM,   1920x1080@60, 4480x600,  1, transform, 3 # 1:90, 2:180, 3:270, 4:flipped
#monitor=$vertM,   1920x1080@60, 840x600,   1, transform, 3
#monitor=$crtM,      720x480@60, 0x0,       1

workspace=1, monitor:$gamingM, default:true
workspace=2, monitor:$gamingM
workspace=3, monitor:$gamingM
workspace=4, monitor:$vertM, layoutopt:orientation:top
workspace=5, monitor:$vertM, layoutopt:orientation:top
workspace=6, monitor:$vertM, layoutopt:orientation:top
workspace=7, monitor:$gamingM
workspace=8, monitor:$gamingM
workspace=9, monitor:$vertM, layoutopt:orientation:top
#workspace=10, monitor:$crtM
# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = fcitx5 -d --replace
# Use mpvpaper for video wallpapers (hyprpaper conflicts with mpvpaper)
exec-once = bash ~/.config/hypr/set-wallpaper.sh

# Idle / DPMS management (powers down monitors "eventually" after lock for bedtime use-case).
exec-once = hypridle

# Eww sidebar
exec-once = eww daemon && sleep 1 && eww open sidebar

# Source a file (multi-file configs)
#source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11

# Propagate Wayland/X11 env to dbus and systemd user session
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY XAUTHORITY
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY XAUTHORITY PATH

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

binds {
    pass_mouse_when_bound = false
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(4ba69cee) rgba(9da09eee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 5
    #blur = yes
    #blur_size = 3
    #blur_passes = 1
    #blur_new_optimizations = on
    blur {
      enabled = true
      size = 3
      passes = 1
      new_optimizations = true
    }
    #drop_shadow = yes
    #shadow_range = 4
    #shadow_render_power = 3
    shadow {
      enabled = true
      range = 4
      render_power = 3
      color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes 
    # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes 
    # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    #new_is_master = true
}

#gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
#    workspace_swipe = off
#}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
#device:epic-mouse-v1 {
#    sensitivity = -0.5
#}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# (Legacy xfreerdp v1 rules — superseded by the active windowrulev2 blocks below
#  that cover both sdl-freerdp (primary) and xfreerdp (fallback).)
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

#windowrulev2 = pseudo, class:^(mpv)$
#windowrulev2 = keepaspectratio on, class:^(mpv)$
#bindm = $mainMod, SHIFT, mouse:272, resizewindow 1
# RDP window rules (sdl-freerdp is the primary native-Wayland client used by werk.fish)
windowrulev2 = workspace 3, class:^(sdl-freerdp)$  # Move to workspace 3 automatically
# Fullscreen only for -l flag
windowrulev2 = fullscreen,  class:^(sdl-freerdp)$, title:^(werk-fullscreen)$
# Tiled mode (default) - no fullscreen, just tile normally
windowrulev2 = tile,        class:^(sdl-freerdp)$, title:^(werk-tiled)$
# Small mode
windowrulev2 = tile,        class:^(sdl-freerdp)$, title:^(werk-small)$
# Common rules for all modes
windowrulev2 = noborder,    class:^(sdl-freerdp)$  # Remove borders for a clean look
windowrulev2 = rounding 0,  class:^(sdl-freerdp)$  # Disable rounding

# Fallback rules for the legacy xfreerdp (XWayland) binary in case it is ever launched directly.
# These are intentionally kept in sync with the sdl-freerdp set above.
windowrulev2 = workspace 3, class:^(xfreerdp)$ 
windowrulev2 = fullscreen,  class:^(xfreerdp)$, title:^(werk-fullscreen)$
windowrulev2 = tile,        class:^(xfreerdp)$, title:^(werk-tiled)$
windowrulev2 = tile,        class:^(xfreerdp)$, title:^(werk-small)$
windowrulev2 = noborder,    class:^(xfreerdp)$
windowrulev2 = rounding 0,  class:^(xfreerdp)$
#windowrulev2 = workspace 2,      class:discord
#windowrulev2 = workspace 2,      class:Slack
#windowrulev2 = maxsize 340 1920, title:^(Chatterino 2)(.*)$
windowrulev2 = stayfocused, class:^(com\.chatterino\.)$, floating:1
# MPV window rules for streams on vertical monitor
windowrulev2 = workspace 4, class:^(mpv)$
# eww apps
windowrulev2 = float,            class:pulsemixer
windowrulev2 = float,            class:bluetuith

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bindl = $mainMod, Return, exec, kitty
bindl = $mainMod, Q, killactive, 
bindl = CTRL ALT, Backspace, exit, 
#bind = $mainMod, E, exec, dolphin
# Simple reliable lock (black screen)
bindl = $mainMod SHIFT, E, exec, hyprlock
bindl = $mainMod, V, togglefloating, 
bindl = $mainMod, F, fullscreen, 
bindl = $mainMod, Space, exec, wofi --show drun
bindl = $mainMod, B, exec, ~/.config/eww/eww-sidebar toggle
#bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, togglesplit, # dwindle
bindl = $mainMod, P, exec, grim -g "$(slurp -d)" - | wl-copy
bindl = $mainMod ALT, P, exec, hyprpicker -f hex -a

# Input method
bindl = $mainMod, I, exec, fcitx5-remote -t
bindl = $mainMod, period, exec, wtype -M ctrl -M alt -M shift -k u

# Move focus with mainMod + h,j,k,l
bindl = $mainMod, H, movefocus, l
bindl = $mainMod, J, movefocus, d
bindl = $mainMod, K, movefocus, u
bindl = $mainMod, L, movefocus, r

# Move focus with mainMod + arrow keys
bindl = $mainMod, left,  movefocus, l
bindl = $mainMod, right, movefocus, r
bindl = $mainMod, up,    movefocus, u
bindl = $mainMod, down,  movefocus, d

# resize active window with mainMod + ALT + h,j,k,l
bindl = $mainMod ALT, H, resizeactive, -10 0
bindl = $mainMod ALT, J, resizeactive,  0 10
bindl = $mainMod ALT, K, resizeactive,  0 -10
bindl = $mainMod ALT, L, resizeactive,  10 0

# resize active window with mainMod + ALT + direction
bindl = $mainMod ALT, left,  resizeactive, -10 0
bindl = $mainMod ALT, down,  resizeactive,  0 10
bindl = $mainMod ALT, up,    resizeactive,  0 -10
bindl = $mainMod ALT, right, resizeactive,  10 0

# swap window with mainMod + SHIFT + h,j,k,l
bindl = $mainMod SHIFT, H, swapwindow, l
bindl = $mainMod SHIFT, J, swapwindow, d
bindl = $mainMod SHIFT, K, swapwindow, u
bindl = $mainMod SHIFT, L, swapwindow, r

# swap window with mainMod + SHIFT + direction
bindl = $mainMod SHIFT, left,  swapwindow, l
bindl = $mainMod SHIFT, down,  swapwindow, d
bindl = $mainMod SHIFT, up,    swapwindow, u
bindl = $mainMod SHIFT, right, swapwindow, r

# Switch workspaces with mainMod + [0-9]
bindl = $mainMod, 1, workspace, 1
bindl = $mainMod, 2, workspace, 2
bindl = $mainMod, 3, workspace, 3
bindl = $mainMod, 4, workspace, 4
bindl = $mainMod, 5, workspace, 5
bindl = $mainMod, 6, workspace, 6
bindl = $mainMod, 7, workspace, 7
bindl = $mainMod, 8, workspace, 8
bindl = $mainMod, 9, workspace, 9
bindl = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindl = $mainMod SHIFT, 1, movetoworkspace, 1
bindl = $mainMod SHIFT, 2, movetoworkspace, 2
bindl = $mainMod SHIFT, 3, movetoworkspace, 3
bindl = $mainMod SHIFT, 4, movetoworkspace, 4
bindl = $mainMod SHIFT, 5, movetoworkspace, 5
bindl = $mainMod SHIFT, 6, movetoworkspace, 6
bindl = $mainMod SHIFT, 7, movetoworkspace, 7
bindl = $mainMod SHIFT, 8, movetoworkspace, 8
bindl = $mainMod SHIFT, 9, movetoworkspace, 9
bindl = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
#bind = $mainMod, mouse_down, workspace, e+1
#bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
