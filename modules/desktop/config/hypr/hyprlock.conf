# hyprlock.conf - minimal reliable black screen lock
# No animations, no fancy backgrounds. Just a solid black screen + password prompt.

general {
    hide_cursor = false
    grace = 0
}

background {
    monitor =
    color = rgb(000000)
}

input-field {
    monitor =
    size = 300, 50
    dots_center = true
    fade_on_empty = false
    placeholder_text = "enter password"
    position = 0, -20
    halign = center
    valign = center
}
