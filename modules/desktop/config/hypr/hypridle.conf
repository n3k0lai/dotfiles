# hypridle.conf - idle management + DPMS for eventual monitor sleep after lock
# Especially for bedtime flow: Win+Shift+E (lock), turn off speakers, walk away.
# Monitors will DPMS off after ~5 minutes of no input (tunable below).

general {
    lock_cmd = hyprlock

    # Standard pre-sleep hook (e.g. systemctl suspend etc. can trigger this too).
    before_sleep_cmd = loginctl lock-session

    # After waking from sleep/DPMS while locked, make sure wallpaper is restored.
    after_sleep_cmd = hyprctl dispatch dpms on && bash ~/.config/hypr/set-wallpaper.sh
}

# DPMS off "eventually" after last user activity.
# This covers the case of manual lock + immediately going to bed (no further input).
# 300s = 5 minutes. Adjust as desired (120-600 are common).
listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && bash ~/.config/hypr/set-wallpaper.sh
}

# (Optional) Uncomment for automatic lock after longer idle.
# listener {
#     timeout = 600   # 10 minutes no input → auto lock
#     on-timeout = loginctl lock-session
# }
